name: Sync Google Drive

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: google-drive-repo-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Restore rclone config
        env:
          RCLONE_CONFIG_B64: ${{ secrets.RCLONE_CONFIG_B64 }}
        run: |
          mkdir -p "$HOME/.config/rclone"
          echo "$RCLONE_CONFIG_B64" | base64 -d > "$HOME/.config/rclone/rclone.conf"

      - name: Create repo snapshot info
        run: |
          cat > _REPO_SNAPSHOT_INFO.md <<EOF
          # Repository snapshot

          Repository: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Commit URL: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
          Synced at UTC: $(date -u +"%Y-%m-%d %H:%M:%S")
          EOF

      - name: Sync repository files to Google Drive
        run: |
          rclone sync . gdrive:/repo-bench \
            --exclude ".git/**" \
            --exclude "target/**" \
            --exclude "node_modules/**" \
            --exclude "dist/**" \
            --exclude "build/**" \
            --exclude ".cache/**" \
            --exclude ".DS_Store" \
            --delete-excluded \
            --drive-chunk-size 64M \
            --transfers 4 \
            --checkers 8 \
            --progress

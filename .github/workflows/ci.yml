name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Rust
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Scripted smoke
        shell: pwsh
        run: |
          $target = Join-Path $env:RUNNER_TEMP "studiofs-bench-smoke"
          $runDir = Join-Path $env:RUNNER_TEMP "studiofs-bench-run"
          $manifest = Join-Path $env:GITHUB_WORKSPACE "Cargo.toml"
          New-Item -ItemType Directory -Force $runDir | Out-Null
          Push-Location $runDir
          cargo run --manifest-path $manifest -- --scripted --target $target --workload-bytes 8 --mode write-only --layout single-file --cache enabled --save-report
          if ((Get-ChildItem -Filter "studiofs-bench-report-*.json").Count -ne 1) { throw "missing JSON report" }
          if ((Get-ChildItem -Filter "studiofs-bench-report-*.csv").Count -ne 1) { throw "missing CSV report" }
          Pop-Location
      - run: cargo test --all-targets

name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Rust
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Scripted smoke
        shell: pwsh
        run: |
          $target = Join-Path $env:RUNNER_TEMP "studiofs-bench-smoke"
          $report = Join-Path $env:RUNNER_TEMP "studiofs-bench-report"
          cargo run -- --scripted --target $target --workload-bytes 8 --mode write-only --layout single-file --cache enabled --save-report $report
      - run: cargo test --all-targets
